name: Release
# Publishes @luxwallet/ui to npm on a v* tag.
# PREREQUISITE: `@luxwallet` npm org + `NPM_TOKEN` secret (owner action).
# Depends on @luxwallet/sdk + @hanzo/gui being published first.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: luxfi-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck && pnpm test
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
